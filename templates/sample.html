<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Analysis — Cloud Carbon Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white border-b border-gray-200 py-4">
        <div class="max-w-4xl mx-auto px-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-xl font-semibold text-gray-900">Cloud Carbon Advisor</span>
            </a>
            <a href="/" class="text-sm text-teal-600 hover:text-teal-700">Upload your own bill</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-8 text-sm text-amber-800">
            This is a sample analysis generated from a synthetic AWS bill. <a href="/" class="underline font-medium">Upload your own bill</a> to get personalized recommendations.
        </div>

        <div id="results-content" class="prose prose-teal max-w-none">
            <p class="text-gray-500 italic">Sample analysis will be generated during Phase 3 after the pipeline is tested with real bills.</p>
        </div>
    </main>
</body>
</html>
